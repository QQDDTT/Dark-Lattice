<div class="grid-layout">
    <!-- Matrix Dimensions -->
    <div class="dash-card">
        <div class="card-title">Active Dimensions</div>
        <div class="card-value">5</div>
        <p class="dash-subtitle">Role, Memory, Step, Layer, Evolution</p>
    </div>

    <!-- Total Nodes -->
    <div class="dash-card">
        <div class="card-title">Atomic Nodes (N)</div>
        <div class="card-value">1,248</div>
        <p class="dash-subtitle">+12 in last 24h</p>
    </div>

    <!-- Edge Density -->
    <div class="dash-card">
        <div class="card-title">Global Connectivity</div>
        <div class="card-value">64.2%</div>
        <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 1rem;">
            <div style="width: 64.2%; height: 100%; background: var(--dash-accent); border-radius: 2px;"></div>
        </div>
    </div>
</div>

<div class="dash-card" style="margin-top: 2rem;">
    <div class="card-title">Dimension Weight Distribution</div>
    <div style="height: 300px; display: flex; align-items: flex-end; gap: 2rem; padding: 1rem 0;">
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div style="width: 100%; background: var(--dash-accent); height: 80%; border-radius: 8px 8px 0 0; opacity: 0.8;"></div>
            <span style="font-size: 0.7rem; color: var(--dash-text-dim);">Role</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div style="width: 100%; background: var(--dash-accent); height: 45%; border-radius: 8px 8px 0 0; opacity: 0.8;"></div>
            <span style="font-size: 0.7rem; color: var(--dash-text-dim);">Memory</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div style="width: 100%; background: var(--dash-accent); height: 95%; border-radius: 8px 8px 0 0; opacity: 0.8;"></div>
            <span style="font-size: 0.7rem; color: var(--dash-text-dim);">Step</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div style="width: 100%; background: var(--dash-accent); height: 30%; border-radius: 8px 8px 0 0; opacity: 0.8;"></div>
            <span style="font-size: 0.7rem; color: var(--dash-text-dim);">Layer</span>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
            <div style="width: 100%; background: var(--dash-accent); height: 15%; border-radius: 8px 8px 0 0; opacity: 0.8;"></div>
            <span style="font-size: 0.7rem; color: var(--dash-text-dim);">Evolution</span>
        </div>
    </div>
</div>
