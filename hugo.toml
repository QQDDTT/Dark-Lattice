baseURL = 'https://dark-lattice.github.io/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh'
title = 'Dark Lattice'
# theme = 'nightfield' # 使用项目根目录布局，不引用外部主题

[params]
    author = "Researcher"
    logo = "/images/logo.svg"
    favicon = "/images/icon.svg"

[languages]
    [languages.zh]
        languageCode = 'zh-cn'
        languageName = '简体中文'
        weight = 1
        contentDir = 'content'
        [languages.zh.params]
            description = "探索深度学习、工业视觉与极致网页设计的交汇点。"
            keywords = ["AI 研究", "网页工程", "深色模式计划", "Hugo 博客"]

    [languages.en]
        languageCode = 'en-us'
        languageName = 'English'
        weight = 2
        contentDir = 'content'
        [languages.en.params]
            description = "Exploring the intersection of Deep Learning, Industrial Vision, and high-end Web Design."
            keywords = ["AI Research", "Web Engineering", "Dark Mode Design", "Hugo Blog"]

    [languages.ja]
        languageCode = 'ja-jp'
        languageName = '日本語'
        weight = 3
        contentDir = 'content'
        [languages.ja.params]
            description = "ディープラーニング、工業用ビジョン、そして最先端ウェブデザインの交差点を探索する。"
            keywords = ["AI 研究", "ウェブエンジニアリング", "ダークモードデザイン", "Hugo ブログ"]

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
    [markup.highlight]
        noClasses = false
        style = "monokai"

[build]

[[menu.main]]
    name = "首页"
    url = "/"
    weight = 1

[[menu.main]]
    name = "博客"
    url = "/posts/"
    weight = 2

[[menu.main]]
    name = "研究"
    url = "/research/"
    weight = 3

[languages.en.menu]
    [[languages.en.menu.main]]
        name = "Home"
        url = "/"
        weight = 1
    [[languages.en.menu.main]]
        name = "Blog"
        url = "/posts/"
        weight = 2
    [[languages.en.menu.main]]
        name = "Research"
        url = "/research/"
        weight = 3

[languages.ja.menu]
    [[languages.ja.menu.main]]
        name = "ホーム"
        url = "/"
        weight = 1
    [[languages.ja.menu.main]]
        name = "ブログ"
        url = "/posts/"
        weight = 2
    [[languages.ja.menu.main]]
        name = "研究"
        url = "/research/"
        weight = 3
