<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="latticeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Orbital Ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#latticeGradient)" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.4" />
  
  <!-- Icosahedron Projection (Lattice Core) -->
  <g filter="url(#glow)">
    <!-- Outer Hexagon -->
    <path d="M100 35 L156.3 67.5 L156.3 132.5 L100 165 L43.7 132.5 L43.7 67.5 Z" fill="none" stroke="url(#latticeGradient)" stroke-width="2.5" stroke-linejoin="round" />
    
    <!-- Internal Lines -->
    <path d="M100 35 L100 165" fill="none" stroke="url(#latticeGradient)" stroke-width="1.5" opacity="0.6" />
    <path d="M156.3 67.5 L43.7 132.5" fill="none" stroke="url(#latticeGradient)" stroke-width="1.5" opacity="0.6" />
    <path d="M156.3 132.5 L43.7 67.5" fill="none" stroke="url(#latticeGradient)" stroke-width="1.5" opacity="0.6" />
    
    <!-- Inner Connections -->
    <path d="M100 75 L143.3 100 L100 125 L56.7 100 Z" fill="none" stroke="url(#latticeGradient)" stroke-width="1" opacity="0.8" />
    <path d="M100 35 L100 75" fill="none" stroke="url(#latticeGradient)" stroke-width="1" opacity="0.8" />
    <path d="M156.3 67.5 L143.3 100" fill="none" stroke="url(#latticeGradient)" stroke-width="1" opacity="0.8" />
    <path d="M156.3 132.5 L143.3 100" fill="none" stroke="url(#latticeGradient)" stroke-width="1" opacity="0.8" />
    <path d="M100 165 L100 125" fill="none" stroke="url(#latticeGradient)" stroke-width="1" opacity="0.8" />
    <path d="M43.7 132.5 L56.7 100" fill="none" stroke="url(#latticeGradient)" stroke-width="1" opacity="0.8" />
    <path d="M43.7 67.5 L56.7 100" fill="none" stroke="url(#latticeGradient)" stroke-width="1" opacity="0.8" />
    
    <!-- Core Node -->
    <circle cx="100" cy="100" r="8" fill="url(#latticeGradient)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
